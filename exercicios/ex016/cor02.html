<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        * { /*Configurações globais das CSS*/
            height: 100%;

        body {
            background-image: linear-gradient(to bottom, #5336b3 20%,#363340 60%,#231F33 10%);
            background-attachment: fixed;
        }
        
    </style>
</head>
<body>
    <h2>Testando Gradiente</h2>
</body>
</html>
